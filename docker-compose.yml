version: "3.8"

services:
    # 1. Cơ sở dữ liệu MariaDB
    db:
        image: mariadb:10.4
        ports:
            - "3306:3306"
        environment:
            MYSQL_DATABASE: binh_db
            MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        volumes:
            - ./EgaGear.sql:/docker-entrypoint-initdb.d/EgaGear.sql

    # 2. Tiến trình AI Node.js
    chatbot-service:
        build: ./egagear-chatbot-service
        ports:
            - "3000:3000"
        restart: always
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3000"]
            interval: 30s
            timeout: 10s
            retries: 3

    # 3. Tiến trình Web Laravel (đã cấu hình Load Balancing & Healthcheck)
    laravel-web:
        build: ./website
        ports:
            - "8000:8000"
        depends_on:
            - db
            - chatbot-service
        deploy:
            replicas: 2 # <--- Chương 8: Tự động chạy 2 bản sao để cân bằng tải
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8000"]
            interval: 30s
            timeout: 10s
            retries: 3
        restart: always

    # 4. Tiến trình chạy ngầm Queue Worker
    laravel-worker:
        build: ./website
        command: php artisan queue:work
        depends_on:
            - db
            - laravel-web
    # 5. Cơ sở dữ liệu RAM - Redis (Kho dùng chung siêu tốc)
    redis:
        image: redis:alpine
        ports:
            - "6379:6379"
        restart: always
